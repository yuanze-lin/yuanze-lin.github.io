<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="disc" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6d5efc"/>
      <stop offset="55%" stop-color="#9b5cf0"/>
      <stop offset="100%" stop-color="#d6519b"/>
    </linearGradient>
    <clipPath id="r"><rect x="2" y="2" width="60" height="60" rx="17"/></clipPath>
  </defs>
  <g clip-path="url(#r)">
    <!-- cosmic disc background -->
    <rect x="2" y="2" width="60" height="60" fill="url(#disc)"/>
    <!-- soft light bloom top-left -->
    <circle cx="18" cy="16" r="16" fill="#ffffff" opacity="0.16"/>
    <!-- orbit ring -->
    <ellipse cx="32" cy="33" rx="24" ry="9" fill="none" stroke="#ffffff" stroke-width="1.6" opacity="0.4" transform="rotate(-20 32 33)"/>
    <!-- tiny stars -->
    <circle cx="12" cy="44" r="1" fill="#fff" opacity="0.9"/>
    <circle cx="52" cy="18" r="1.1" fill="#fff" opacity="0.9"/>
    <circle cx="49" cy="47" r="0.9" fill="#fff" opacity="0.8"/>
  </g>
  <!-- YL monogram -->
  <text x="32" y="43" font-family="'Space Grotesk','Trebuchet MS',sans-serif" font-size="30" font-weight="700" fill="#ffffff" text-anchor="middle" letter-spacing="-1.5" style="paint-order:stroke">YL</text>
  <rect x="2" y="2" width="60" height="60" rx="17" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.35"/>
</svg>
