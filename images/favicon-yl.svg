<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5b4bf0"/>
      <stop offset="52%" stop-color="#8b57ee"/>
      <stop offset="100%" stop-color="#d6519b"/>
    </linearGradient>
    <radialGradient id="core" cx="38%" cy="34%" r="70%">
      <stop offset="0%" stop-color="#fff7ff"/>
      <stop offset="60%" stop-color="#ffe28a"/>
      <stop offset="100%" stop-color="#ff9f6b"/>
    </radialGradient>
    <clipPath id="r"><rect x="2" y="2" width="60" height="60" rx="17"/></clipPath>
  </defs>
  <g clip-path="url(#r)">
    <rect x="2" y="2" width="60" height="60" fill="url(#sky)"/>
    <circle cx="18" cy="16" r="15" fill="#ffffff" opacity="0.15"/>
    <!-- tiny background stars -->
    <circle cx="12" cy="46" r="1" fill="#fff" opacity="0.85"/>
    <circle cx="53" cy="15" r="1.1" fill="#fff" opacity="0.85"/>
    <circle cx="50" cy="50" r="0.9" fill="#fff" opacity="0.75"/>
    <!-- three orbit rings (atom / solar system) -->
    <g stroke="#ffffff" stroke-width="1.7" fill="none" opacity="0.9">
      <ellipse cx="32" cy="32" rx="22" ry="8.5" transform="rotate(0 32 32)"/>
      <ellipse cx="32" cy="32" rx="22" ry="8.5" transform="rotate(60 32 32)"/>
      <ellipse cx="32" cy="32" rx="22" ry="8.5" transform="rotate(120 32 32)"/>
    </g>
    <!-- orbiting electrons -->
    <circle cx="54" cy="32" r="2.1" fill="#5eead4"/>
    <circle cx="20" cy="14.5" r="1.8" fill="#a78bfa"/>
    <circle cx="20" cy="49.5" r="1.8" fill="#ffd93d"/>
    <!-- glowing core -->
    <circle cx="32" cy="32" r="7.5" fill="url(#core)"/>
  </g>
  <rect x="2" y="2" width="60" height="60" rx="17" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.4"/>
</svg>
