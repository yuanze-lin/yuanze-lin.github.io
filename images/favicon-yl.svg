<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <clipPath id="r"><rect x="3" y="3" width="58" height="58" rx="15"/></clipPath>
  </defs>
  <!-- hard offset shadow -->
  <rect x="7" y="8" width="54" height="54" rx="15" fill="#1b1a17"/>
  <!-- sticker body -->
  <g clip-path="url(#r)">
    <rect x="3" y="3" width="58" height="58" rx="15" fill="#ff5c39"/>
    <!-- yellow highlighter swipe -->
    <rect x="-4" y="38" width="72" height="13" fill="#ffd93d" transform="rotate(-8 32 44)"/>
    <!-- purple corner blob -->
    <circle cx="54" cy="12" r="12" fill="#6c4cff"/>
  </g>
  <rect x="3" y="3" width="58" height="58" rx="15" fill="none" stroke="#1b1a17" stroke-width="3"/>
  <!-- YL monogram -->
  <text x="31" y="42" font-family="'Space Grotesk', 'Trebuchet MS', sans-serif" font-size="30" font-weight="700" fill="#1b1a17" text-anchor="middle" letter-spacing="-1">YL</text>
</svg>
