<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eef1ff"/>
      <stop offset="55%" stop-color="#f2ecff"/>
      <stop offset="100%" stop-color="#fdeef7"/>
    </linearGradient>
    <linearGradient id="planet" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6d5efc"/>
      <stop offset="100%" stop-color="#d6519b"/>
    </linearGradient>
    <clipPath id="r"><rect x="2" y="2" width="60" height="60" rx="16"/></clipPath>
  </defs>
  <g clip-path="url(#r)">
    <rect x="2" y="2" width="60" height="60" fill="url(#sky)"/>
    <!-- soft nebula washes -->
    <circle cx="14" cy="14" r="15" fill="#6d5efc" opacity="0.14"/>
    <circle cx="52" cy="50" r="15" fill="#d6519b" opacity="0.14"/>
    <!-- little stars -->
    <circle cx="14" cy="42" r="1.1" fill="#6d5efc"/>
    <circle cx="48" cy="16" r="1.1" fill="#d6519b"/>
    <circle cx="44" cy="46" r="0.9" fill="#5a8cff"/>
    <circle cx="22" cy="22" r="0.8" fill="#d6519b"/>
    <!-- ringed planet -->
    <g transform="rotate(-18 32 33)">
      <ellipse cx="32" cy="33" rx="20" ry="6.5" fill="none" stroke="#d6519b" stroke-width="2.4" opacity="0.85"/>
      <circle cx="32" cy="33" r="11" fill="url(#planet)"/>
      <ellipse cx="32" cy="33" rx="20" ry="6.5" fill="none" stroke="#6d5efc" stroke-width="2.4" opacity="0.9" stroke-dasharray="30 60" stroke-dashoffset="14"/>
    </g>
  </g>
  <rect x="2" y="2" width="60" height="60" rx="16" fill="none" stroke="#6d5efc" stroke-width="2" opacity="0.6"/>
</svg>
